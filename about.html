<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
html, body {
  height: 100%;
}

body {
  display: flex;
  flex-direction: column;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #0f172a, #020617);
  color: #fff;
}

/* HEADER */
header {
  background: rgba(15, 23, 42, 0.9);
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
}

header h1 {
  color: #38bdf8;
  margin-bottom: 8px;
}

nav a {
  margin: 0 12px;
  color: #38bdf8;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover {
  color: #fff;
}

/* ABOUT SECTION */
#about {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* CARD */
.about-card {
  background: rgba(30, 41, 59, 0.9);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(56,189,248,0.25);
  max-width: 600px;
  text-align: center;
}

/* PROFILE IMAGE */
.about-card img {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #38bdf8;
  box-shadow: 0 0 25px #38bdf8;
}

/* TEXT */
.about-card h2 {
  color: #38bdf8;
  margin-bottom: 10px;
}

.about-card p {
  font-size: 15px;
  line-height: 1.6;
  color: #cbd5f5;
}

/* SKILLS */
.skills {
  margin-top: 15px;
}

.skills span {
  display: inline-block;
  background: #0ea5e9;
  color: black;
  padding: 5px 10px;
  margin: 5px;
  border-radius: 6px;
  font-size: 13px;
}

/* FOOTER */
footer {
  background: #020617;
  text-align: center;
  padding: 20px;
  color: #94a3b8;
}
</style>
</head>
