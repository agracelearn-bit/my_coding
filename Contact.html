<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Channel - Contact</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
html, body {
  height: 100%;
}

body {
  display: flex;
  flex-direction: column;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #0f172a, #020617);
  color: #fff;
}

/* HEADER */
header {
  background: rgba(15, 23, 42, 0.9);
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
}

header h1 {
  color: #38bdf8;
  margin-bottom: 8px;
}

/* NAV */
nav a {
  margin: 0 12px;
  color: #38bdf8;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover {
  color: #fff;
}

/* SECTION */
section {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* CONTACT CARD */
.contact-box {
  background: rgba(30, 41, 59, 0.9);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(56,189,248,0.25);
  width: 100%;
  max-width: 380px;
  text-align: center;
}

/* TITLE */
.contact-box h2 {
  margin-bottom: 20px;
  color: #38bdf8;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 10px 0;
  font-size: 14px;
  outline: none;
}

/* FOCUS EFFECT */
input:focus, textarea:focus {
  box-shadow: 0 0 8px #38bdf8;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(45deg, #38bdf8, #0ea5e9);
  border: none;
  cursor: pointer;
  color: #000;
  font-weight: bold;
  border-radius: 8px;
  margin-top: 10px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* FOOTER */
footer {
  background: #020617;
  text-align: center;
  padding: 15px;
  font-size: 14px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>
  <h1>Code Hub Youtube Channel🚀</h1>
  <nav>
    <a href="yw.html">Home</a>
    <a href="video.html">Videos</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section>
  <div class="contact-box">
    <h2>Contact Me 📩</h2>

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Your Message"></textarea>

    <button class="btn" onclick="sendMessage()">Send Message 🚀</button>
  </div>
</section>

<footer>
  <p>© 2026 My Channel | All Rights Reserved</p>
</footer>

<script>
function sendMessage() {
  alert("Message sent successfully! ✅");
}
</script>

</body>
</html>
